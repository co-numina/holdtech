<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1900" width="1200" height="1900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#08080f"/>
      <stop offset="100%" stop-color="#0e0b1a"/>
    </linearGradient>
    <linearGradient id="sol" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9945FF"/>
      <stop offset="100%" stop-color="#14F195"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9945FF"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="burn" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="50%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#eab308"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="25" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="12" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="rc"><rect width="1200" height="1900" rx="32"/></clipPath>
  </defs>

  <g clip-path="url(#rc)">
    <rect width="1200" height="1900" fill="url(#bg)"/>

    <!-- Grid -->
    <g opacity="0.03" stroke="#9945FF" stroke-width="0.5">
      <line x1="200" y1="0" x2="200" y2="1900"/><line x1="400" y1="0" x2="400" y2="1900"/>
      <line x1="600" y1="0" x2="600" y2="1900"/><line x1="800" y1="0" x2="800" y2="1900"/>
      <line x1="1000" y1="0" x2="1000" y2="1900"/>
      <line x1="0" y1="200" x2="1200" y2="200"/><line x1="0" y1="400" x2="1200" y2="400"/>
      <line x1="0" y1="600" x2="1200" y2="600"/><line x1="0" y1="800" x2="1200" y2="800"/>
      <line x1="0" y1="1000" x2="1200" y2="1000"/><line x1="0" y1="1200" x2="1200" y2="1200"/>
      <line x1="0" y1="1400" x2="1200" y2="1400"/><line x1="0" y1="1600" x2="1200" y2="1600"/>
      <line x1="0" y1="1800" x2="1200" y2="1800"/>
    </g>

    <!-- Glow orbs -->
    <circle cx="150" cy="250" r="250" fill="#9945FF" opacity="0.05" filter="url(#glow)"/>
    <circle cx="1050" cy="1600" r="300" fill="#14F195" opacity="0.03" filter="url(#glow)"/>

    <!-- Top bar -->
    <rect y="0" width="1200" height="4" fill="url(#sol)"/>

    <!-- ═══ HEADER ═══ -->
    <g transform="translate(540, 50)" filter="url(#glow2)">
      <path d="M60 6L10 28v38c0 35 21.5 68 50 75 28.5-7 50-40 50-75V28L60 6z" fill="none" stroke="url(#sol)" stroke-width="3.5"/>
      <path d="M60 18L20 36v28c0 29 18 56 40 62 22-6 40-33 40-62V36L60 18z" fill="#9945FF" opacity="0.12"/>
      <text x="60" y="82" text-anchor="middle" fill="url(#sol)" font-family="system-ui, -apple-system, sans-serif" font-size="40" font-weight="900">H</text>
    </g>
    <text x="600" y="200" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="60" font-weight="900" letter-spacing="8">$HOLDTECH</text>
    <text x="600" y="242" text-anchor="middle" fill="#9945FF" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" letter-spacing="5">TOKENOMICS &amp; FLYWHEEL</text>
    <line x1="250" y1="272" x2="950" y2="272" stroke="url(#sol)" stroke-width="1" opacity="0.15"/>

    <!-- ═══ FLYWHEEL ═══ -->
    <text x="100" y="320" fill="#14F195" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" letter-spacing="4">THE FLYWHEEL</text>

    <!-- Flywheel circle -->
    <g transform="translate(600, 470)">
      <circle cx="0" cy="0" r="120" fill="none" stroke="#9945FF" stroke-width="1" opacity="0.08" stroke-dasharray="6 4"/>

      <rect x="-110" y="-135" width="220" height="44" rx="10" fill="#1a1530" stroke="#9945FF" stroke-width="1" opacity="0.6"/>
      <text x="0" y="-107" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700">Traders scan tokens</text>

      <rect x="80" y="-22" width="220" height="44" rx="10" fill="#1a1020" stroke="#f97316" stroke-width="1" opacity="0.6"/>
      <text x="190" y="6" text-anchor="middle" fill="#f97316" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700">$HOLDTECH burned</text>

      <rect x="-110" y="91" width="220" height="44" rx="10" fill="#0e1a18" stroke="#14F195" stroke-width="1" opacity="0.6"/>
      <text x="0" y="119" text-anchor="middle" fill="#14F195" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700">Supply decreases</text>

      <rect x="-300" y="-22" width="220" height="44" rx="10" fill="#1a1530" stroke="#b06aff" stroke-width="1" opacity="0.6"/>
      <text x="-190" y="6" text-anchor="middle" fill="#b06aff" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700">Value accrues</text>

      <!-- Arrows -->
      <path d="M70,-95 Q140,-70 140,-28" fill="none" stroke="#9945FF" stroke-width="2" opacity="0.35"/>
      <polygon points="140,-28 135,-40 145,-40" fill="#9945FF" opacity="0.4"/>
      <path d="M140,28 Q140,70 70,95" fill="none" stroke="#f97316" stroke-width="2" opacity="0.35"/>
      <polygon points="70,95 82,90 78,100" fill="#f97316" opacity="0.4"/>
      <path d="M-70,95 Q-140,70 -140,28" fill="none" stroke="#14F195" stroke-width="2" opacity="0.35"/>
      <polygon points="-140,28 -135,40 -145,40" fill="#14F195" opacity="0.4"/>
      <path d="M-140,-28 Q-140,-70 -70,-95" fill="none" stroke="#b06aff" stroke-width="2" opacity="0.35"/>
      <polygon points="-70,-95 -82,-90 -78,-100" fill="#b06aff" opacity="0.4"/>
    </g>

    <text x="600" y="635" text-anchor="middle" fill="#606078" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="500">Every deep scan burns tokens. More usage = less supply. Product drives price.</text>

    <line x1="250" y1="670" x2="950" y2="670" stroke="url(#sol)" stroke-width="1" opacity="0.1"/>

    <!-- ═══ HOLD TIERS ═══ -->
    <text x="100" y="715" fill="#14F195" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" letter-spacing="4">HOLD TIERS</text>

    <!-- FREE -->
    <rect x="80" y="735" width="1040" height="105" rx="14" fill="#111120" stroke="#333355" stroke-width="1"/>
    <text x="120" y="768" fill="#666680" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" letter-spacing="3">FREE</text>
    <text x="200" y="768" fill="#888899" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500">No tokens required</text>
    <text fill="#9090a8" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="400">
      <tspan x="120" y="800">Bundler feed</tspan>
      <tspan x="300" y="800">·</tspan>
      <tspan x="320" y="800">Single scans</tspan>
      <tspan x="480" y="800">·</tspan>
      <tspan x="500" y="800">3 watchlist slots</tspan>
      <tspan x="680" y="800">·</tspan>
      <tspan x="700" y="800">Rate-limited batch</tspan>
    </text>

    <!-- SCOUT -->
    <rect x="80" y="855" width="1040" height="115" rx="14" fill="#13102a" stroke="#9945FF" stroke-width="1" opacity="0.7"/>
    <rect x="80" y="855" width="4" height="115" rx="2" fill="#9945FF"/>
    <text x="120" y="890" fill="#9945FF" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" letter-spacing="3">SCOUT</text>
    <rect x="210" y="877" width="100" height="20" rx="6" fill="#9945FF" opacity="0.1"/>
    <text x="260" y="892" text-anchor="middle" fill="#b06aff" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700">Hold 5M</text>
    <text fill="#a0a0b8" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="400">
      <tspan x="120" y="920">10 watchlist</tspan>
      <tspan x="265" y="920">·</tspan>
      <tspan x="285" y="920">Batch 5 tokens</tspan>
      <tspan x="120" y="948">Scan history</tspan>
      <tspan x="265" y="948">·</tspan>
      <tspan x="285" y="948">All group filters</tspan>
    </text>

    <!-- OPERATOR -->
    <rect x="80" y="985" width="1040" height="125" rx="14" fill="#161030" stroke="#b06aff" stroke-width="1" opacity="0.8"/>
    <rect x="80" y="985" width="4" height="125" rx="2" fill="#b06aff"/>
    <text x="120" y="1020" fill="#b06aff" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" letter-spacing="3">OPERATOR</text>
    <rect x="260" y="1007" width="100" height="20" rx="6" fill="#b06aff" opacity="0.1"/>
    <text x="310" y="1022" text-anchor="middle" fill="#c084fc" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700">Hold 10M</text>
    <text fill="#b0b0c8" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="400">
      <tspan x="120" y="1050">50 watchlist</tspan>
      <tspan x="265" y="1050">·</tspan>
      <tspan x="285" y="1050">Batch 20 tokens</tspan>
      <tspan x="500" y="1050">·</tspan>
      <tspan x="520" y="1050">Custom bundler groups</tspan>
      <tspan x="120" y="1078">API access</tspan>
      <tspan x="265" y="1078">·</tspan>
      <tspan x="285" y="1078">Priority RPC</tspan>
    </text>

    <!-- WHALE -->
    <rect x="80" y="1125" width="1040" height="125" rx="14" fill="#1a1238" stroke="url(#sol)" stroke-width="1.5"/>
    <rect x="80" y="1125" width="4" height="125" rx="2" fill="url(#sol)"/>
    <text x="120" y="1160" fill="#14F195" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" letter-spacing="3">WHALE</text>
    <rect x="218" y="1147" width="100" height="20" rx="6" fill="#14F195" opacity="0.1"/>
    <text x="268" y="1162" text-anchor="middle" fill="#14F195" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700">Hold 20M</text>
    <text fill="#c0c0d8" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="400">
      <tspan x="120" y="1190">200 watchlist</tspan>
      <tspan x="280" y="1190">·</tspan>
      <tspan x="300" y="1190">Batch 50 tokens</tspan>
      <tspan x="500" y="1190">·</tspan>
      <tspan x="520" y="1190">Raw data export</tspan>
      <tspan x="120" y="1218">Early features</tspan>
      <tspan x="280" y="1218">·</tspan>
      <tspan x="300" y="1218">Unlimited everything</tspan>
    </text>

    <line x1="250" y1="1290" x2="950" y2="1290" stroke="url(#sol)" stroke-width="1" opacity="0.1"/>

    <!-- ═══ API ═══ -->
    <text x="100" y="1335" fill="#14F195" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" letter-spacing="4">PUBLIC API</text>
    <rect x="80" y="1355" width="1040" height="72" rx="12" fill="#0c0c16" stroke="#14F195" stroke-width="1" opacity="0.4"/>
    <text x="120" y="1388" fill="#14F195" font-family="'SF Mono', 'Fira Code', monospace" font-size="16" font-weight="600" opacity="0.8">GET /api/v1/scan/{mint}</text>
    <text x="120" y="1412" fill="#606078" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="400">Token-gated programmatic access. Build on top of HoldTech data.</text>

    <line x1="250" y1="1465" x2="950" y2="1465" stroke="url(#sol)" stroke-width="1" opacity="0.1"/>

    <!-- ═══ LIVE NOW ═══ -->
    <text x="100" y="1510" fill="#14F195" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" letter-spacing="4">LIVE NOW</text>

    <g fill="#b0b0c8" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="400">
      <circle cx="108" cy="1542" r="4" fill="#14F195" opacity="0.7"/>
      <text x="122" y="1547">Holder quality scanner — paste any CA, full holderbase autopsy</text>
      <circle cx="108" cy="1574" r="4" fill="#14F195" opacity="0.7"/>
      <text x="122" y="1579">Chrome extension — scores on pump.fun, DexScreener, Birdeye, Solscan</text>
      <circle cx="108" cy="1606" r="4" fill="#14F195" opacity="0.7"/>
      <text x="122" y="1611">Bundler feed dashboard — real-time new token monitoring</text>
      <circle cx="108" cy="1638" r="4" fill="#14F195" opacity="0.7"/>
      <text x="122" y="1643">Shareable scan cards — one click visual report</text>
    </g>

    <!-- ═══ FOOTER ═══ -->
    <line x1="250" y1="1700" x2="950" y2="1700" stroke="url(#sol)" stroke-width="1" opacity="0.15"/>

    <text x="600" y="1750" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="800" letter-spacing="1">THE PRODUCT IS SHIPPED. THE FLYWHEEL IS BURNING.</text>

    <rect x="380" y="1775" width="440" height="46" rx="12" fill="url(#purple)"/>
    <text x="600" y="1804" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="17" font-weight="800" letter-spacing="1">holder-quality.vercel.app</text>

    <!-- Bottom bar -->
    <rect y="1896" width="1200" height="4" fill="url(#sol)"/>

    <!-- Watermark -->
    <g transform="translate(1070, 1830)" opacity="0.05">
      <path d="M30 4L6 18v24c0 22 13 43 24 48 11-5 24-26 24-48V18L30 4z" fill="#9945FF"/>
    </g>
  </g>
</svg>