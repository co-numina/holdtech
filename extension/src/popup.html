<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 360px;
    min-height: 200px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f0f0f6;
    color: #1a1a2e;
  }
  .header {
    padding: 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid rgba(153,69,255,0.12);
  }
  .logo {
    font-family: 'Courier New', monospace;
    font-size: 14px;
    font-weight: 800;
    background: linear-gradient(135deg, #9945FF, #14F195);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .beta {
    font-size: 9px;
    font-weight: 700;
    color: #9945FF;
    border: 1px solid rgba(153,69,255,0.3);
    border-radius: 4px;
    padding: 2px 6px;
    font-family: 'Courier New', monospace;
  }
  .search {
    padding: 12px 16px;
  }
  .search-row {
    display: flex;
    gap: 8px;
  }
  .search input {
    flex: 1;
    padding: 10px 12px;
    border: 1px solid rgba(153,69,255,0.15);
    border-radius: 10px;
    font-size: 12px;
    background: rgba(255,255,255,0.7);
    color: #1a1a2e;
    outline: none;
    font-family: 'Courier New', monospace;
  }
  .search input:focus {
    border-color: #9945FF;
    box-shadow: 0 0 0 2px rgba(153,69,255,0.1);
  }
  .search input::placeholder { color: #999; }
  .scan-btn {
    padding: 10px 16px;
    background: linear-gradient(135deg, #9945FF, #7B3FE4);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Courier New', monospace;
    white-space: nowrap;
  }
  .scan-btn:hover { opacity: 0.9; }
  .scan-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .result {
    padding: 0 16px 16px;
  }
  .score-card {
    background: rgba(255,255,255,0.6);
    border: 1px solid rgba(153,69,255,0.12);
    border-radius: 12px;
    padding: 16px;
    backdrop-filter: blur(10px);
  }
  .score-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .token-name {
    font-size: 14px;
    font-weight: 700;
  }
  .grade {
    font-family: 'Courier New', monospace;
    font-size: 20px;
    font-weight: 800;
    padding: 4px 12px;
    border-radius: 8px;
  }
  .grade-a { background: rgba(20,241,149,0.15); color: #0a9; }
  .grade-b { background: rgba(20,241,149,0.1); color: #2b8; }
  .grade-c { background: rgba(234,179,8,0.15); color: #a80; }
  .grade-d { background: rgba(239,68,68,0.1); color: #c44; }
  .grade-f { background: rgba(239,68,68,0.15); color: #e33; }

  .metrics {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 12px;
  }
  .metric {
    background: rgba(153,69,255,0.03);
    border-radius: 8px;
    padding: 10px;
  }
  .metric-label {
    font-size: 9px;
    color: #888;
    text-transform: uppercase;
    font-family: 'Courier New', monospace;
    letter-spacing: 0.05em;
  }
  .metric-value {
    font-size: 16px;
    font-weight: 700;
    color: #1a1a2e;
    margin-top: 2px;
    font-family: 'Courier New', monospace;
  }

  .verdict-text {
    font-size: 11px;
    color: #555;
    line-height: 1.6;
    border-top: 1px solid rgba(153,69,255,0.08);
    padding-top: 10px;
  }

  .loading {
    text-align: center;
    padding: 32px 16px;
    color: #888;
    font-size: 12px;
  }
  .spinner {
    width: 24px;
    height: 24px;
    border: 2px solid rgba(153,69,255,0.15);
    border-top-color: #9945FF;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error {
    padding: 12px 16px;
    color: #e33;
    font-size: 12px;
    text-align: center;
  }

  .view-full {
    display: block;
    text-align: center;
    padding: 10px;
    font-size: 11px;
    color: #9945FF;
    text-decoration: none;
    font-weight: 600;
    border-top: 1px solid rgba(153,69,255,0.08);
    margin-top: 8px;
  }
  .view-full:hover { text-decoration: underline; }

  .empty {
    text-align: center;
    padding: 32px 16px;
    color: #aaa;
    font-size: 12px;
  }
  .empty-icon { font-size: 32px; margin-bottom: 8px; opacity: 0.5; }
</style>
</head>
<body>
  <div class="header">
    <div class="logo">HOLDERSCOPE</div>
    <div class="beta">BETA</div>
  </div>

  <div class="search">
    <div class="search-row">
      <input id="mint-input" type="text" placeholder="Paste token address..." spellcheck="false">
      <button id="scan-btn" class="scan-btn">SCAN</button>
    </div>
  </div>

  <div id="content">
    <div class="empty">
      <div class="empty-icon">🔬</div>
      Paste a Solana token address to scan
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
